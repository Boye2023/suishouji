name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Build APK
        run: |
          # Create Android project structure
          mkdir -p app/src/main/java/com/suishouji/app
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets

          # Copy built HTML into assets (loads locally, no network needed)
          cp docs/index.html app/src/main/assets/index.html

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
              <uses-feature android:name="android.hardware.camera" android:required="false"/>
              <application
                  android:allowBackup="true"
                  android:label="随手记"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.suishouji.app.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/file_paths"/>
                  </provider>
              </application>
          </manifest>
          MF

          # MainActivity with JavaScript interface
          cat > app/src/main/java/com/suishouji/app/MainActivity.java << 'JAVA'
          package com.suishouji.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.*;
          import android.graphics.Color;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.content.Intent;
          import android.net.Uri;
          import android.provider.MediaStore;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.core.content.FileProvider;
          import java.io.*;
          import android.util.Base64;

          public class MainActivity extends Activity {
              private static final int REQ_PERM = 1, REQ_GALLERY = 2, REQ_CAMERA = 3;
              private WebView wv;
              private Uri cameraUri;

              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  wv = new WebView(this);
                  wv.setBackgroundColor(Color.parseColor("#F5F6FA"));
                  setContentView(wv);
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setAllowFileAccess(true);
                  ws.setMediaPlaybackRequiresUserGesture(false);
                  ws.setDatabaseEnabled(true);
                  ws.setAllowContentAccess(true);
                  ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  ws.setCacheMode(WebSettings.LOAD_NO_CACHE);

                  wv.addJavascriptInterface(new Bridge(), "Android");

                  wv.setWebChromeClient(new WebChromeClient() {
                      @Override public void onPermissionRequest(PermissionRequest r) { r.grant(r.getResources()); }
                  });
                  wv.setWebViewClient(new WebViewClient());

                  String[] perms = {Manifest.permission.RECORD_AUDIO, Manifest.permission.CAMERA};
                  boolean ok = true;
                  for (String p : perms)
                      if (ContextCompat.checkSelfPermission(this, p) != PackageManager.PERMISSION_GRANTED) ok = false;
                  if (!ok) ActivityCompat.requestPermissions(this, perms, REQ_PERM);

                  // Load local HTML from assets (no network dependency)
                  wv.loadUrl("file:///android_asset/index.html");
              }

              private void sendImage(Uri uri) {
                  try {
                      InputStream is = getContentResolver().openInputStream(uri);
                      byte[] data = new byte[is.available()];
                      is.read(data); is.close();
                      final String b64 = Base64.encodeToString(data, Base64.NO_WRAP);
                      wv.post(() -> wv.evaluateJavascript("window.__imageResult('" + b64 + "')", null));
                  } catch (Exception e) {
                      final String msg = e.getMessage();
                      wv.post(() -> wv.evaluateJavascript("window.__imageError('" + msg + "')", null));
                  }
              }

              @Override protected void onActivityResult(int rc, int rv, Intent d) {
                  super.onActivityResult(rc, rv, d);
                  if (rv != RESULT_OK) return;
                  if (rc == REQ_GALLERY && d != null && d.getData() != null) {
                      sendImage(d.getData());
                  }
                  if (rc == REQ_CAMERA) {
                      if (d != null && d.getData() != null) {
                          sendImage(d.getData());
                      } else if (d != null && d.getExtras() != null && d.getExtras().get("data") != null) {
                          android.graphics.Bitmap bmp = (android.graphics.Bitmap) d.getExtras().get("data");
                          java.io.ByteArrayOutputStream baos = new java.io.ByteArrayOutputStream();
                          bmp.compress(android.graphics.Bitmap.CompressFormat.JPEG, 90, baos);
                          byte[] bytes = baos.toByteArray();
                          final String b64 = android.util.Base64.encodeToString(bytes, android.util.Base64.NO_WRAP);
                          wv.post(() -> wv.evaluateJavascript("window.__imageResult('" + b64 + "')", null));
                      }
                  }
              }

              class Bridge {
                  @JavascriptInterface public void openGallery() {
                      startActivityForResult(new Intent(Intent.ACTION_PICK,
                          MediaStore.Images.Media.EXTERNAL_CONTENT_URI), REQ_GALLERY);
                  }
                  @JavascriptInterface public void openCamera() {
                      Intent i = new Intent(MediaStore.ACTION_IMAGE_CAPTURE);
                      if (i.resolveActivity(getPackageManager()) != null) {
                          startActivityForResult(i, REQ_CAMERA);
                      }
                  }
              }
          }
          JAVA

          cat > app/src/main/res/xml/file_paths.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths><cache-path name="cache" path="."/></paths>
          XML

          cat > app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.DeviceDefault.NoActionBar">
                  <item name="android:statusBarColor">#4A90D9</item>
              </style>
          </resources>
          XML

          cat > app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><color name="ic_background">#4A90D9</color></resources>
          XML

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#FFFFFF"
                  android:pathData="M30,30h48v48h-48zM33,33h12v3h-12zM33,39h30v3h-30zM33,45h30v3h-30zM33,51h24v3h-24z"/>
          </vector>
          XML

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#4A90D9" android:pathData="M0,0h108v108h-108z"/>
          </vector>
          XML

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          XML

          # Gradle files
          cat > build.gradle << 'GR'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GR

          cat > app/build.gradle << 'GR'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.suishouji.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.suishouji.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile rootProject.file('suishouji.keystore')
                      storePassword 'suishouji123'
                      keyAlias 'suishouji'
                      keyPassword 'suishouji123'
                  }
              }
              buildTypes {
                  release { minifyEnabled false; signingConfig signingConfigs.release }
              }
          }
          dependencies {
              implementation 'androidx.webkit:webkit:1.8.0'
              implementation 'androidx.core:core:1.12.0'
          }
          GR

          cat > settings.gradle << 'GR'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          include ':app'
          GR

          cat > gradle.properties << 'GR'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          GR

          gradle wrapper --gradle-version 8.4

          # Generate keystore & build
          keytool -genkey -v -keystore suishouji.keystore -alias suishouji \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass suishouji123 -keypass suishouji123 \
            -dname "CN=SJ, OU=App, O=SJ, L=BJ, ST=BJ, C=CN"

          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: suishouji-apk
          path: app/build/outputs/apk/release/*.apk
