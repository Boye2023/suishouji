name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Create Android Project
        run: |
          mkdir -p app/src/main/java/com/suishouji/app
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/xml

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
              <uses-feature android:name="android.hardware.camera" android:required="false"/>
              <application
                  android:allowBackup="true"
                  android:label="随手记"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <meta-data android:name="android.webkit.WebView.MetricsOptOut" android:value="true" />
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths"/>
                  </provider>
              </application>
          </manifest>
          EOF

          # MainActivity.java with JavaScript interface for native image picking
          cat > app/src/main/java/com/suishouji/app/MainActivity.java << 'EOF'
          package com.suishouji.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.PermissionRequest;
          import android.webkit.JavascriptInterface;
          import android.graphics.Color;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import android.content.Intent;
          import android.net.Uri;
          import android.provider.MediaStore;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import androidx.core.content.FileProvider;
          import java.io.File;
          import java.io.InputStream;
          import android.util.Base64;
          import android.webkit.ValueCallback;

          public class MainActivity extends Activity {
              private static final int REQ_PERMISSIONS = 1;
              private static final int REQ_GALLERY = 2;
              private static final int REQ_CAMERA = 3;
              private WebView webView;
              private Uri cameraUri;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  webView.setBackgroundColor(Color.parseColor("#F5F6FA"));
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setDatabaseEnabled(true);
                  s.setAllowContentAccess(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  webView.addJavascriptInterface(new WebAppInterface(), "Android");

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          request.grant(request.getResources());
                      }
                  });
                  webView.setWebViewClient(new WebViewClient());

                  requestPermissions();
                  webView.loadUrl("https://boye2023.github.io/suishouji/");
              }

              private void requestPermissions() {
                  String[] needed = {Manifest.permission.RECORD_AUDIO, Manifest.permission.CAMERA};
                  boolean allGranted = true;
                  for (String p : needed) {
                      if (ContextCompat.checkSelfPermission(this, p) != PackageManager.PERMISSION_GRANTED)
                          allGranted = false;
                  }
                  if (!allGranted)
                      ActivityCompat.requestPermissions(this, needed, REQ_PERMISSIONS);
              }

              private void sendImageToJS(Uri uri) {
                  try {
                      InputStream is = getContentResolver().openInputStream(uri);
                      byte[] bytes = new byte[is.available()];
                      is.read(bytes);
                      is.close();
                      String b64 = Base64.encodeToString(bytes, Base64.NO_WRAP);
                      final String js = "window.__imageResult('" + b64 + "')";
                      webView.post(new Runnable() {
                          @Override public void run() { webView.evaluateJavascript(js, null); }
                      });
                  } catch (Exception e) {
                      final String js = "window.__imageError('" + e.getMessage() + "')";
                      webView.post(new Runnable() {
                          @Override public void run() { webView.evaluateJavascript(js, null); }
                      });
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (resultCode != RESULT_OK) return;
                  Uri uri = null;
                  if (requestCode == REQ_GALLERY && data != null) uri = data.getData();
                  if (requestCode == REQ_CAMERA) uri = cameraUri;
                  if (uri != null) sendImageToJS(uri);
              }

              public class WebAppInterface {
                  @JavascriptInterface
                  public void openGallery() {
                      Intent intent = new Intent(Intent.ACTION_PICK, MediaStore.Images.Media.EXTERNAL_CONTENT_URI);
                      startActivityForResult(intent, REQ_GALLERY);
                  }
                  @JavascriptInterface
                  public void openCamera() {
                      Intent intent = new Intent(MediaStore.ACTION_IMAGE_CAPTURE);
                      File photoFile = new File(getExternalCacheDir(), "photo.jpg");
                      cameraUri = FileProvider.getUriForFile(MainActivity.this,
                          getPackageName() + ".fileprovider", photoFile);
                      intent.putExtra(MediaStore.EXTRA_OUTPUT, cameraUri);
                      startActivityForResult(intent, REQ_CAMERA);
                  }
              }
          }
          EOF

          # FileProvider for camera
          mkdir -p app/src/main/res/xml
          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="cache" path="."/>
          </paths>
          EOF

          # styles.xml
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.DeviceDefault.NoActionBar">
                  <item name="android:statusBarColor">#4A90D9</item>
                  <item name="android:navigationBarColor">#FFFFFF</item>
              </style>
          </resources>
          EOF

          # colors.xml
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_background">#4A90D9</color>
          </resources>
          EOF

          # Adaptive icon
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#FFFFFF"
                  android:pathData="M30,30h48v48h-48zM33,33h12v3h-12zM33,39h30v3h-30zM33,45h30v3h-30zM33,51h24v3h-24z"/>
          </vector>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#4A90D9" android:pathData="M0,0h108v108h-108z"/>
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          # Network security config for cleartext traffic
          cat > app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">localhost</domain>
              </domain-config>
          </network-security-config>
          EOF

      - name: Setup Gradle
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.suishouji.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.suishouji.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile rootProject.file('suishouji.keystore')
                      storePassword 'suishouji123'
                      keyAlias 'suishouji'
                      keyPassword 'suishouji123'
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
          }
          dependencies {
              implementation 'androidx.webkit:webkit:1.8.0'
              implementation 'androidx.core:core:1.12.0'
          }
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          include ':app'
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          gradle wrapper --gradle-version 8.4

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore suishouji.keystore -alias suishouji \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass suishouji123 -keypass suishouji123 \
            -dname "CN=Suishouji, OU=App, O=Suishouji, L=Beijing, ST=Beijing, C=CN"

      - name: Build Signed Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: suishouji-apk
          path: app/build/outputs/apk/release/*.apk
