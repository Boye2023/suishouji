// ============================================================
// charts.js — SVG-based bar chart and donut chart
// ============================================================
window.App = window.App || {};

(function() {
  const App = window.App;

  App.renderWeekChart = async function(containerId, referenceDate) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const dates = App.getWeekDates(referenceDate);
    const startDate = App.startOfDay(dates[0]);
    const endDate = App.endOfDay(dates[6]);

    const notes = await App.getAllNotes({ startDate, endDate, limit: 10000 });
    const dayCounts = {}, dayTypes = {};
    for (const note of notes) {
      const key = App.dateKey(note.createdAt);
      if (!dayCounts[key]) { dayCounts[key] = 0; dayTypes[key] = { text: 0, image: 0, voice: 0 }; }
      dayCounts[key]++;
      if (dayTypes[key][note.type] !== undefined) dayTypes[key][note.type]++;
    }

    const data = dates.map(d => ({
      label: App.WEEKDAY_NAMES[d.getDay()],
      count: dayCounts[App.dateKey(d)] || 0
    }));
    const maxCount = Math.max(...data.map(d => d.count), 1);

    if (data.every(d => d.count === 0)) {
      container.innerHTML = '<div class="chart-empty">本周暂无记录</div>';
      return;
    }

    const width = container.clientWidth - 32 || 320;
    const height = 140;
    const pad = { top: 10, right: 10, bottom: 22, left: 10 };
    const cw = width - pad.left - pad.right, ch = height - pad.top - pad.bottom;
    const barWidth = Math.floor((cw / 7) - 6);
    const gap = (cw - barWidth * 7) / 6;

    let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;
    for (let i = 0; i <= 3; i++) {
      const y = pad.top + (ch / 3) * i;
      const val = Math.round(maxCount * (1 - i / 3));
      svg += `<line x1="${pad.left}" y1="${y}" x2="${width - pad.right}" y2="${y}" stroke="#F0F0F5" stroke-width="1"/>`;
      svg += `<text x="${pad.left - 4}" y="${y + 4}" text-anchor="end" font-size="10" fill="#C7C7CC">${val}</text>`;
    }
    let x = pad.left;
    const todayDayOfWeek = new Date().getDay();
    data.forEach((d, i) => {
      const barH = maxCount > 0 ? (d.count / maxCount) * ch : 0;
      const y = pad.top + ch - barH;
      const isToday = (i === todayDayOfWeek - 1) || (todayDayOfWeek === 0 && i === 6);
      svg += `<rect x="${x}" y="${y}" width="${barWidth}" height="${Math.max(barH, 1)}" rx="4" fill="#4A90D9" opacity="${isToday ? '1' : '0.6'}"/>`;
      if (d.count > 0) svg += `<text x="${x + barWidth / 2}" y="${y - 4}" text-anchor="middle" font-size="10" fill="#8E8E93" font-weight="600">${d.count}</text>`;
      svg += `<text x="${x + barWidth / 2}" y="${height - 4}" text-anchor="middle" font-size="10" fill="${isToday ? '#4A90D9' : '#8E8E93'}" font-weight="${isToday ? '600' : '400'}">${d.label}</text>`;
      x += barWidth + gap;
    });
    svg += '</svg>';
    container.innerHTML = svg;
  };

  App.renderMonthChart = async function(containerId, year, month) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const days = App.getMonthDays(year, month);
    const startDate = App.startOfDay(days[0]);
    const endDate = App.endOfDay(days[days.length - 1]);

    const notes = await App.getAllNotes({ startDate, endDate, limit: 10000 });
    const dayCounts = {};
    for (const note of notes) {
      const key = App.dateKey(note.createdAt);
      dayCounts[key] = (dayCounts[key] || 0) + 1;
    }
    const data = days.map(d => ({ date: d.getDate(), count: dayCounts[App.dateKey(d)] || 0 }));
    const maxCount = Math.max(...data.map(d => d.count), 1);

    if (data.every(d => d.count === 0)) {
      container.innerHTML = '<div class="chart-empty">本月暂无记录</div>';
      return;
    }

    const width = container.clientWidth - 32 || 320;
    const cellSize = Math.floor(width / 7) - 2;
    const firstDay = days[0].getDay();
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    const rows = Math.ceil((offset + days.length) / 7);
    const height = rows * (cellSize + 2) + 18;

    let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;
    ['一','二','三','四','五','六','日'].forEach((day, i) => {
      svg += `<text x="${i * (cellSize + 2) + cellSize / 2}" y="10" text-anchor="middle" font-size="9" fill="#C7C7CC">${day}</text>`;
    });
    data.forEach((d, i) => {
      const col = (offset + i) % 7;
      const row = Math.floor((offset + i) / 7) + 1;
      const rx = col * (cellSize + 2);
      const ry = row * (cellSize + 2) + 5;
      const intensity = maxCount > 0 ? d.count / maxCount : 0;
      const alpha = 0.08 + intensity * 0.92;
      svg += `<rect x="${rx}" y="${ry}" width="${cellSize}" height="${cellSize}" rx="3" fill="#4A90D9" opacity="${alpha}"/>`;
      if (d.count > 0) svg += `<text x="${rx + cellSize / 2}" y="${ry + cellSize / 2 + 3}" text-anchor="middle" font-size="9" fill="${intensity > 0.6 ? 'white' : '#4A90D9'}" font-weight="600">${d.count}</text>`;
    });
    svg += '</svg>';
    container.innerHTML = svg;
  };

  App.renderDonutChart = async function(containerId, startDate, endDate) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const notes = await App.getAllNotes({ startDate: startDate.getTime(), endDate: endDate.getTime(), limit: 10000 });
    const counts = { text: 0, image: 0, voice: 0 };
    for (const note of notes) { if (counts[note.type] !== undefined) counts[note.type]++; }
    const total = counts.text + counts.image + counts.voice;
    if (total === 0) { container.innerHTML = '<div class="chart-empty">暂无数据</div>'; return; }

    const colors = { text: '#4A90D9', image: '#4ECDC4', voice: '#FF6B6B' };
    const labels = { text: '文字', image: '图片', voice: '语音' };
    const size = 160, center = size / 2, radius = 60, sw = 18, circ = 2 * Math.PI * radius;

    let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
    svg += `<circle cx="${center}" cy="${center}" r="${radius}" fill="none" stroke="#F0F0F5" stroke-width="${sw}"/>`;
    let off = 0;
    ['text','image','voice'].forEach(type => {
      if (counts[type] === 0) return;
      const ratio = counts[type] / total;
      const dash = ratio * circ;
      svg += `<circle cx="${center}" cy="${center}" r="${radius}" fill="none" stroke="${colors[type]}" stroke-width="${sw}" stroke-dasharray="${dash} ${circ - dash}" stroke-dashoffset="${-off}" transform="rotate(-90 ${center} ${center})" stroke-linecap="round"/>`;
      off += dash;
    });
    svg += `<text x="${center}" y="${center - 6}" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A2E">${total}</text>`;
    svg += `<text x="${center}" y="${center + 14}" text-anchor="middle" font-size="11" fill="#8E8E93">总计</text>`;
    svg += '</svg>';

    let legend = '<div style="display:flex;justify-content:center;gap:16px;margin-top:8px;flex-wrap:wrap;">';
    ['text','image','voice'].forEach(type => {
      if (counts[type] === 0) return;
      const pct = Math.round((counts[type] / total) * 100);
      legend += `<div style="display:flex;align-items:center;gap:4px;font-size:12px;color:#8E8E93;"><span style="width:8px;height:8px;border-radius:50%;background:${colors[type]};display:inline-block;"></span>${labels[type]} ${counts[type]} (${pct}%)</div>`;
    });
    legend += '</div>';
    container.innerHTML = svg + legend;
  };

})();

// ============================================================
// home.js — Home page: Quick record
// ============================================================
window.App = window.App || {};

(function() {
  const App = window.App;

  var _homeInited = false;
  var _saving = false;

  App.mountHomePage = function() {
    if (_homeInited) return;
    _homeInited = true;

    initNoteTypeSelector();
    initTextInput();
    initImageSection();
    initVoiceSection();

    if (!App.isVoiceSupported()) {
      const voiceBtn = document.querySelector('[data-type="voice"]');
      if (voiceBtn) { voiceBtn.style.opacity = '0.4'; voiceBtn.title = '当前浏览器不支持录音'; }
    }
  };

  App.unmountHomePage = function() {};

  function initNoteTypeSelector() {
    const buttons = document.querySelectorAll('.note-type-btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.type;
        buttons.forEach(b => b.classList.remove('note-type-btn--active'));
        btn.classList.add('note-type-btn--active');
        document.querySelectorAll('.record-view').forEach(v => v.classList.remove('record-view--active'));
        const viewMap = { text: 'viewText', image: 'viewImage', voice: 'viewVoice' };
        const viewEl = document.getElementById(viewMap[type]);
        if (viewEl) viewEl.classList.add('record-view--active');
        App.setState('noteType', type);
      });
    });
  }

  function initTextInput() {
    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('textCharCount');
    const sendBtn = document.getElementById('btnSendText');
    if (!textInput) return;

    textInput.addEventListener('input', () => {
      const len = textInput.value.length;
      charCount.textContent = `${len}/5000`;
      sendBtn.disabled = len === 0;
    });

    sendBtn.addEventListener('click', async () => {
      if (_saving) return;
      const content = textInput.value.trim();
      if (!content) return;
      _saving = true;
      sendBtn.disabled = true;
      showAI(true);
      try {
        const note = await App.processWithAI({ type: 'text', textContent: content });
        await App.saveNote(note);
        textInput.value = '';
        charCount.textContent = '0/5000';
        showToast('文字记录已保存');
      } catch(err) {
        console.error('Save text error:', err);
        showToast('保存失败，请重试', true);
      } finally {
        showAI(false);
        sendBtn.disabled = false;
        _saving = false;
      }
    });

    window.addEventListener('page-changed', (e) => {
      if (e.detail.page === 'home' && App.getState('noteType') === 'text') {
        setTimeout(() => textInput.focus(), 300);
      }
    });
    setTimeout(() => textInput.focus(), 500);
  }

  function initImageSection() {
    App.initImageUploader({
      onFileSelected: async ({ file, thumbnail, caption }) => {
        if (_saving) return;
        _saving = true;
        showAI(true);
        try {
          const note = await App.processWithAI({ type: 'image', textContent: caption || '', imageBlob: file, imageThumbnail: thumbnail });
          await App.saveNote(note);
          App.clearPendingImage();
          showToast('图片记录已保存');
        } catch(err) {
          console.error('Save image error:', err);
          showToast('保存失败，请重试', true);
        } finally { showAI(false); _saving = false; }
      },
      onFileRemoved: () => {},
      onError: (msg) => showToast(msg, true)
    });
  }

  function initVoiceSection() {
    App.initVoiceRecorder({
      onRecordingStart: () => {},
      onRecordingStop: async ({ blob, duration }) => {
        if (_saving) return;
        _saving = true;
        showAI(true);
        try {
          const note = await App.processWithAI({ type: 'voice', voiceBlob: blob, voiceDuration: duration });
          await App.saveNote(note);
          showToast('语音记录已保存');
        } catch(err) {
          console.error('Save voice error:', err);
          showToast('保存失败，请重试', true);
        } finally { showAI(false); _saving = false; }
      },
      onError: (err) => {
        if (err.name === 'NotAllowedError') showToast('请允许使用麦克风', true);
        else if (err.name === 'NotFoundError') showToast('未检测到麦克风设备', true);
        else showToast('录音失败，请重试', true);
      }
    });
  }

  function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toastText');
    if (!toast) return;
    toast.classList.remove('toast--visible', 'toast--error');
    toastText.textContent = message;
    if (isError) toast.classList.add('toast--error');
    void toast.offsetWidth;
    toast.classList.add('toast--visible');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => toast.classList.remove('toast--visible'), 2000);
  }

  function showAI(show) {
    const overlay = document.getElementById('aiProcessing');
    if (overlay) { if (show) overlay.classList.remove('hidden'); else overlay.classList.add('hidden'); }
  }

})();

// ============================================================
// profile.js — Profile page: login, stats, storage
// ============================================================
window.App = window.App || {};

(function() {
  const App = window.App;
  let weekOffset = 0, monthOffset = 0;

  var _profileInited = false;

  App.mountProfilePage = async function() {
    if (_profileInited) { await loadUserInfo(); await loadQuickStats(); return; }
    _profileInited = true;

    await loadUserInfo();
    await loadQuickStats();
    await loadWeeklyReport();
    await loadMonthlyReport();
    await loadStorageInfo();
    initLoginModal();
    initWeekNav();
    initMonthNav();
  };

  App.unmountProfilePage = function() {};

  async function loadUserInfo() {
    const user = await App.getSetting('user');
    const nameEl = document.getElementById('profileName');
    const metaEl = document.getElementById('profileMeta');
    const avatarEl = document.getElementById('profileAvatar');
    const loginBtn = document.getElementById('btnLogin');
    if (user && user.name) {
      nameEl.textContent = user.name;
      metaEl.textContent = user.email || '已登录';
      avatarEl.classList.add('profile-card__avatar--logged-in');
      loginBtn.textContent = '退出';
      loginBtn.classList.add('profile-card__action--logout');
    } else {
      nameEl.textContent = '未登录';
      metaEl.textContent = '登录以同步数据';
      avatarEl.classList.remove('profile-card__avatar--logged-in');
      loginBtn.textContent = '登录';
      loginBtn.classList.remove('profile-card__action--logout');
    }
  }

  async function loadQuickStats() {
    const counts = await App.getNoteCounts();
    document.getElementById('statTotal').textContent = counts.total;
    document.getElementById('statText').textContent = counts.text;
    document.getElementById('statImage').textContent = counts.image;
    document.getElementById('statVoice').textContent = counts.voice;
  }

  async function loadWeeklyReport() {
    const refDate = new Date();
    refDate.setDate(refDate.getDate() + weekOffset * 7);
    document.getElementById('weekRange').textContent = App.weekRangeStr(refDate);
    await App.renderWeekChart('weekChart', refDate);
  }

  function initWeekNav() {
    document.getElementById('btnPrevWeek').addEventListener('click', () => { weekOffset--; loadWeeklyReport(); });
    document.getElementById('btnNextWeek').addEventListener('click', () => { if (weekOffset < 0) { weekOffset++; loadWeeklyReport(); } });
  }

  async function loadMonthlyReport() {
    const now = new Date();
    const refDate = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
    document.getElementById('monthRange').textContent = App.monthRangeStr(refDate);
    await App.renderMonthChart('monthBarChart', refDate.getFullYear(), refDate.getMonth());
    const startDate = new Date(refDate.getFullYear(), refDate.getMonth(), 1);
    const endDate = new Date(refDate.getFullYear(), refDate.getMonth() + 1, 0, 23, 59, 59, 999);
    await App.renderDonutChart('monthDonutChart', startDate, endDate);
  }

  function initMonthNav() {
    document.getElementById('btnPrevMonth').addEventListener('click', () => { monthOffset--; loadMonthlyReport(); });
    document.getElementById('btnNextMonth').addEventListener('click', () => { if (monthOffset < 0) { monthOffset++; loadMonthlyReport(); } });
  }

  async function loadStorageInfo() {
    const usage = await App.getStorageUsage();
    const el = document.getElementById('storageUsage');
    const fill = document.getElementById('storageFill');
    if (usage.quota > 0) {
      const usedMB = (usage.usage / (1024 * 1024)).toFixed(1);
      const totalMB = (usage.quota / (1024 * 1024)).toFixed(0);
      el.textContent = `${usedMB} MB / ${totalMB} MB`;
      fill.style.width = `${Math.min(usage.percent, 100)}%`;
      if (usage.percent > 80) fill.style.background = 'var(--color-error)';
      else if (usage.percent > 60) fill.style.background = 'var(--color-warning)';
    } else { el.textContent = '--'; }
  }

  function initLoginModal() {
    const modal = document.getElementById('loginModal');
    const loginBtn = document.getElementById('btnLogin');
    const closeBtn = document.getElementById('btnCloseModal');
    const confirmBtn = document.getElementById('btnConfirmLogin');

    loginBtn.addEventListener('click', async () => {
      const user = await App.getSetting('user');
      if (user && user.name) {
        if (confirm('确定退出登录吗？数据不会丢失。')) {
          await App.setSetting('user', null);
          await loadUserInfo();
        }
        return;
      }
      modal.classList.remove('hidden');
    });

    closeBtn.addEventListener('click', () => modal.classList.add('hidden'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });

    confirmBtn.addEventListener('click', async () => {
      const nickname = document.getElementById('inputNickname').value.trim();
      if (!nickname) { alert('请输入昵称'); return; }
      const email = document.getElementById('inputEmail').value.trim();
      await App.setSetting('user', { name: nickname, email: email || '', createdAt: Date.now() });
      modal.classList.add('hidden');
      document.getElementById('inputNickname').value = '';
      document.getElementById('inputEmail').value = '';
      await loadUserInfo();
    });
  }

})();


// ====== js/app.js ======
// ============================================================
// app.js — Application entry point, router, initialization
// ============================================================
window.App = window.App || {};

(function() {
  const App = window.App;

  const pages = {
    home: { mount: null, unmount: null },
    memory: { mount: null, unmount: null },
    profile: { mount: null, unmount: null }
  };

  let activePage = 'home';

  async function init() {
    console.log('随手记 — 轻量碎片记录');
    console.log('Initializing...');

    // Register page handlers (set up by their respective modules)
    pages.home.mount = App.mountHomePage;
    pages.home.unmount = App.unmountHomePage;
    pages.memory.mount = App.mountMemoryBankPage;
    pages.memory.unmount = App.unmountMemoryBankPage;
    pages.profile.mount = App.mountProfilePage;
    pages.profile.unmount = App.unmountProfilePage;

    // Init tab bar
    App.initTabBar();

    // Mount home page
    await mountPage('home');

    // Listen for page changes
    App.subscribe('currentPage', async (page) => {
      if (page !== activePage) await switchToPage(page);
    });

    window.addEventListener('page-changed', async (e) => {
      if (e.detail.page !== activePage) await switchToPage(e.detail.page);
    });

    window.addEventListener('navigate', async (e) => {
      await switchToPage(e.detail.page);
    });

    // Check memory bank page when it becomes active
    window.addEventListener('page-changed', async (e) => {
      if (e.detail.page === 'memory' && App.refreshMemoryBank) {
        await App.refreshMemoryBank();
      }
      if (e.detail.page === 'profile') {
        // Refresh stats
        const counts = await App.getNoteCounts();
        const statTotal = document.getElementById('statTotal');
        if (statTotal) statTotal.textContent = counts.total;
        document.getElementById('statText').textContent = counts.text;
        document.getElementById('statImage').textContent = counts.image;
        document.getElementById('statVoice').textContent = counts.voice;
      }
    });

    if (!window.indexedDB) {
      alert('您的浏览器不支持 IndexedDB，部分功能可能无法使用。');
    }

    console.log('随手记 初始化完成');
  }

  async function switchToPage(page) {
    if (page === activePage) return;
    console.log(`Switching: ${activePage} → ${page}`);

    if (pages[activePage] && pages[activePage].unmount) {
      pages[activePage].unmount();
    }

    const tabItem = document.querySelector(`.tab-bar__item[data-page="${page}"]`);
    if (tabItem && !tabItem.classList.contains('tab-bar__item--active')) {
      App.switchPage(page, false);
    }

    await mountPage(page);
    activePage = page;
  }

  async function mountPage(page) {
    if (pages[page] && pages[page].mount) {
      try {
        await pages[page].mount();
      } catch(err) {
        console.error(`Error mounting "${page}":`, err);
      }
    }
  }

  // ============================================================
  // Service Worker
  // ============================================================
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  // ============================================================
  // Boot
  // ============================================================
  window.addEventListener('unhandledrejection', (event) => {
    console.error('Unhandled rejection:', event.reason);
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();

</script>
