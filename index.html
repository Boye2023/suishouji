<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="随手记">
  <title>随手记</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app" class="app-container">
    <!-- Page: Home (Quick Record) -->
    <div id="page-home" class="page page--active">
      <header class="page-header">
        <h1 class="page-header__title">随手记</h1>
        <span class="page-header__subtitle">轻量碎片记录</span>
      </header>
      <div class="home-content">
        <!-- Note type selector -->
        <div class="note-type-selector" id="noteTypeSelector">
          <button class="note-type-btn note-type-btn--active" data-type="text">
            <svg class="note-type-btn__icon" viewBox="0 0 24 24" width="20" height="20"><path d="M3 3h12l6 6v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm1 2v14h16V10h-5V5H4zm7 3h6v2h-6V8zm0 4h6v2h-6v-2z" fill="currentColor"/></svg>
            <span>文字</span>
          </button>
          <button class="note-type-btn" data-type="image">
            <svg class="note-type-btn__icon" viewBox="0 0 24 24" width="20" height="20"><path d="M3 3h18a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm1 2v14h16V5H4zm3 8l2.5 3 3.5-4.5L17 16H7l0-3z" fill="currentColor"/></svg>
            <span>图片</span>
          </button>
          <button class="note-type-btn" data-type="voice">
            <svg class="note-type-btn__icon" viewBox="0 0 24 24" width="20" height="20"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm0 2a1 1 0 0 0-1 1v6a1 1 0 0 0 2 0V5a1 1 0 0 0-1-1zm-4 9a4 4 0 0 0 8 0h2a6 6 0 0 1-5 5.91V21h-2v-2.09A6 6 0 0 1 6 13h2z" fill="currentColor"/></svg>
            <span>语音</span>
          </button>
        </div>

        <!-- Record area -->
        <div class="record-area" id="recordArea">
          <!-- Text input view -->
          <div class="record-view record-view--active" id="viewText">
            <div class="text-input-wrapper">
              <textarea
                class="text-input"
                id="textInput"
                placeholder="记录此刻的想法..."
                rows="4"
                maxlength="5000"
              ></textarea>
              <div class="text-input__footer">
                <span class="text-input__counter" id="textCharCount">0/5000</span>
                <button class="btn-send" id="btnSendText" disabled>
                  <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/></svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Image input view -->
          <div class="record-view" id="viewImage">
            <div class="image-upload-area" id="imageUploadArea">
              <div class="image-drop-zone" id="imageDropZone">
                <svg viewBox="0 0 48 48" width="48" height="48" class="image-drop-zone__icon"><path d="M8 8h32a2 2 0 0 1 2 2v28a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2zm2 2v24h28V10H10zm6 12l4 5.5L25 21l6 9H10l6-9zm2-4a2 2 0 1 1 0 4 2 2 0 0 1 0-4z" fill="currentColor"/></svg>
                <p class="image-drop-zone__text">点击选择或拖拽图片</p>
                <p class="image-drop-zone__hint">支持 JPG、PNG、WebP，最大 20MB</p>
              </div>
              <input type="file" accept="image/*" id="imageFileInput" class="image-file-input">
            </div>
            <div class="image-preview hidden" id="imagePreview">
              <img id="imagePreviewImg" class="image-preview__img" alt="预览">
              <button class="image-preview__remove" id="btnRemoveImage">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/></svg>
              </button>
            </div>
            <div class="image-caption-wrapper hidden" id="imageCaptionWrapper">
              <textarea
                class="image-caption-input"
                id="imageCaptionInput"
                placeholder="添加文字描述（可选）..."
                rows="2"
                maxlength="2000"
              ></textarea>
              <button class="btn-send" id="btnSendImage" disabled>
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/></svg>
              </button>
            </div>
          </div>

          <!-- Voice input view -->
          <div class="record-view" id="viewVoice">
            <div class="voice-recorder" id="voiceRecorder">
              <div class="voice-recorder__visual" id="voiceVisual">
                <canvas id="voiceWaveform" class="voice-waveform" width="280" height="80"></canvas>
                <div class="voice-recorder__timer" id="voiceTimer">00:00</div>
              </div>
              <div class="voice-recorder__status" id="voiceStatus">点击开始录音</div>
              <button class="voice-record-btn" id="btnVoiceRecord">
                <svg class="voice-record-btn__icon" viewBox="0 0 24 24" width="32" height="32"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" fill="currentColor"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- AI processing overlay -->
        <div class="ai-processing hidden" id="aiProcessing">
          <div class="ai-processing__dots">
            <span class="ai-processing__dot"></span>
            <span class="ai-processing__dot"></span>
            <span class="ai-processing__dot"></span>
          </div>
          <span class="ai-processing__text">AI 整理中...</span>
        </div>

        <!-- Sent confirmation toast -->
        <div class="toast hidden" id="toast">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="currentColor"/></svg>
          <span id="toastText">已保存</span>
        </div>
      </div>
    </div>

    <!-- Page: Memory Bank -->
    <div id="page-memory" class="page">
      <header class="page-header">
        <h1 class="page-header__title">记忆库</h1>
        <span class="page-header__subtitle" id="memoryNoteCount">0 条记录</span>
      </header>
      <div class="memory-content">
        <!-- Calendar strip -->
        <div class="calendar-strip-wrapper">
          <div class="calendar-strip" id="calendarStrip">
            <!-- Dynamically rendered -->
          </div>
        </div>

        <!-- Search bar -->
        <div class="search-bar-wrapper">
          <div class="search-bar">
            <svg class="search-bar__icon" viewBox="0 0 24 24" width="18" height="18"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
            <input
              type="search"
              class="search-bar__input"
              id="searchInput"
              placeholder="搜索记录、标题、标签..."
              autocomplete="off"
            >
            <button class="search-bar__clear hidden" id="btnClearSearch">
              <svg viewBox="0 0 24 24" width="16" height="16"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>

        <!-- Timeline feed -->
        <div class="timeline" id="timeline">
          <div class="timeline__empty hidden" id="timelineEmpty">
            <svg viewBox="0 0 64 64" width="64" height="64" class="timeline__empty-icon"><path d="M32 8C18.7 8 8 18.7 8 32s10.7 24 24 24 24-10.7 24-24S45.3 8 32 8zm0 44c-11 0-20-9-20-20s9-20 20-20 20 9 20 20-9 20-20 20zm-4-28h8v8h-8v-8zm0 12h8v8h-8v-8z" fill="currentColor"/></svg>
            <p class="timeline__empty-text">还没有记录</p>
            <p class="timeline__empty-hint">去首页记录第一条碎片吧</p>
          </div>
          <div class="timeline__list" id="timelineList">
            <!-- Dynamically rendered -->
          </div>
          <div class="timeline__loading hidden" id="timelineLoading">
            <div class="spinner"></div>
            <span>加载中...</span>
          </div>
          <div class="timeline__sentinel" id="timelineSentinel"></div>
        </div>
      </div>
    </div>

    <!-- Page: Profile -->
    <div id="page-profile" class="page">
      <header class="page-header">
        <h1 class="page-header__title">我的</h1>
      </header>
      <div class="profile-content">
        <!-- User section -->
        <div class="profile-card">
          <div class="profile-card__avatar" id="profileAvatar">
            <svg viewBox="0 0 24 24" width="40" height="40"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/></svg>
          </div>
          <div class="profile-card__info">
            <div class="profile-card__name" id="profileName">未登录</div>
            <div class="profile-card__meta" id="profileMeta">登录以同步数据</div>
          </div>
          <button class="profile-card__action" id="btnLogin">登录</button>
        </div>

        <!-- Quick stats -->
        <div class="quick-stats" id="quickStats">
          <div class="quick-stat">
            <div class="quick-stat__value" id="statTotal">0</div>
            <div class="quick-stat__label">总记录</div>
          </div>
          <div class="quick-stat">
            <div class="quick-stat__value" id="statText">0</div>
            <div class="quick-stat__label">文字</div>
          </div>
          <div class="quick-stat">
            <div class="quick-stat__value" id="statImage">0</div>
            <div class="quick-stat__label">图片</div>
          </div>
          <div class="quick-stat">
            <div class="quick-stat__value" id="statVoice">0</div>
            <div class="quick-stat__label">语音</div>
          </div>
        </div>

        <!-- Weekly report -->
        <div class="stats-section">
          <div class="stats-section__header">
            <h3 class="stats-section__title">周度报告</h3>
            <div class="stats-section__nav">
              <button class="stats-nav-btn" id="btnPrevWeek">
                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/></svg>
              </button>
              <span class="stats-section__range" id="weekRange">--</span>
              <button class="stats-nav-btn" id="btnNextWeek">
                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" fill="currentColor"/></svg>
              </button>
            </div>
          </div>
          <div class="chart-container" id="weekChart">
            <div class="chart-empty">暂无数据</div>
          </div>
        </div>

        <!-- Monthly report -->
        <div class="stats-section">
          <div class="stats-section__header">
            <h3 class="stats-section__title">月度报告</h3>
            <div class="stats-section__nav">
              <button class="stats-nav-btn" id="btnPrevMonth">
                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/></svg>
              </button>
              <span class="stats-section__range" id="monthRange">--</span>
              <button class="stats-nav-btn" id="btnNextMonth">
                <svg viewBox="0 0 24 24" width="16" height="16"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" fill="currentColor"/></svg>
              </button>
            </div>
          </div>
          <div class="chart-container" id="monthBarChart">
            <div class="chart-empty">暂无数据</div>
          </div>
          <div class="chart-donut-wrapper" id="monthDonutChart">
            <div class="chart-empty">暂无数据</div>
          </div>
        </div>

        <!-- Storage info -->
        <div class="storage-info">
          <div class="storage-info__header">
            <span>存储用量</span>
            <span id="storageUsage">--</span>
          </div>
          <div class="storage-info__bar">
            <div class="storage-info__fill" id="storageFill" style="width: 0%"></div>
          </div>
        </div>

        <!-- Login modal -->
        <div class="modal-overlay hidden" id="loginModal">
          <div class="modal">
            <div class="modal__header">
              <h3 class="modal__title">登录随手记</h3>
              <button class="modal__close" id="btnCloseModal">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/></svg>
              </button>
            </div>
            <div class="modal__body">
              <div class="form-group">
                <label class="form-label">昵称</label>
                <input type="text" class="form-input" id="inputNickname" placeholder="输入你的昵称" maxlength="20">
              </div>
              <div class="form-group">
                <label class="form-label">邮箱（选填）</label>
                <input type="email" class="form-input" id="inputEmail" placeholder="用于数据恢复">
              </div>
              <button class="btn-primary btn-block" id="btnConfirmLogin">确认登录</button>
              <p class="modal__hint">登录后数据将同步至云端，更换设备不丢失</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-bar__item tab-bar__item--active" data-page="home">
        <svg class="tab-bar__icon" viewBox="0 0 24 24" width="24" height="24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
        <span class="tab-bar__label">随手记</span>
      </button>
      <button class="tab-bar__item" data-page="memory">
        <svg class="tab-bar__icon" viewBox="0 0 24 24" width="24" height="24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V9h14v10zm0-12H5V5h14v2zM7 11h5v5H7v-5z" fill="currentColor"/></svg>
        <span class="tab-bar__label">记忆库</span>
      </button>
      <button class="tab-bar__item" data-page="profile">
        <svg class="tab-bar__icon" viewBox="0 0 24 24" width="24" height="24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/></svg>
        <span class="tab-bar__label">我的</span>
      </button>
    </nav>
  </div>

  <!-- BUILT_JS -->
</body>
</html>
